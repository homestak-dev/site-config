schema_version: 2
name: n2-push
description: "2-level: PVE node + push-mode leaf VM"
pattern: tiered

nodes:
  - name: root-pve
    type: pve
    spec: pve
    preset: vm-large
    image: pve-9
    vmid: 99011
    disk: 64

  - name: edge
    type: vm
    spec: base
    preset: vm-small
    image: debian-12
    vmid: 99021
    parent: root-pve
